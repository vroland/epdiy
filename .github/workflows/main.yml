name: ESP-IDF

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y -qq clang-format-18
      - run: |
          which clang-format
          make format-check

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - v5.2
          - v5.3
          - v5.4
          - v6.0
        target:
          - esp32
          - esp32s3
        example:
          - demo
        include:
          - version: v5.4
            example: screen_diag
          - version: v5.4
            example: dragon
          - version: v5.4
            example: grayscale_test
          - version: v5.4
            example: www-image
          - version: v5.4
            example: calibration_helper
          - version: v5.4
            example: test
          - version: v6.0
            example: screen_diag
          - version: v6.0
            example: dragon
          - version: v6.0
            example: grayscale_test
          - version: v6.0
            example: www-image
          - version: v6.0
            example: calibration_helper
          - version: v6.0
            example: test

    continue-on-error: ${{ matrix.version == 'latest' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Use minimal sdkconfig for IDF 6
        if: startsWith(matrix.version, 'v6')
        run: |
          for f in examples/${{ matrix.example }}/sdkconfig.defaults.*; do
            [ -f "$f" ] && : > "$f"
          done
          printf '%s\n' \
            "CONFIG_PARTITION_TABLE_SINGLE_APP_LARGE=y" \
            "CONFIG_COMPILER_OPTIMIZATION_PERF=y" \
            "CONFIG_SPIRAM=y" \
            > examples/${{ matrix.example }}/sdkconfig.defaults
      - uses: 'espressif/esp-idf-ci-action@v1'
        with:
          esp_idf_version: ${{ matrix.version }}
          target: ${{ matrix.target }}
          path: 'examples/${{ matrix.example }}'

  build-arduino:
    runs-on: ubuntu-latest
    container:
      image: "espressif/idf:${{ matrix.version }}"
    strategy:
      fail-fast: false
      matrix:
        version:
          - v5.3.2
        example:
          - weather
        arduino-esp32:
          - 3.1.3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Checkout Arduino ESP
        uses: actions/checkout@v6
        with:
          repository: espressif/arduino-esp32
          ref: ${{ matrix.arduino-esp32 }}
          path: examples/${{ matrix.example }}/components/arduino
          submodules: recursive
          fetch-depth: 1
      - name: esp-idf build
        run: |
          . $IDF_PATH/export.sh
          cd examples/${{ matrix.example }}
          idf.py set-target esp32s3
          idf.py build

